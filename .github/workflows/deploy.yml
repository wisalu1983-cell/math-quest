name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # v0.2-1-1（F3 开发者工具栏）· 双构建双路径：
      #   dist/        → 纯净生产版（无 F3 代码），部署到 /math-quest/
      #   dist-dev/    → 带 F3 测试版，拷贝到 dist/dev/，部署到 /math-quest/dev/
      - name: Build (clean)
        run: npm run build

      - name: Build (with dev tool)
        run: npm run build:with-dev-tool

      - name: Merge outputs
        run: |
          mkdir -p dist/dev
          cp -r dist-dev/. dist/dev/

      - name: Verify clean build has no F3 code
        run: |
          if grep -r "mq-dev-tool-root" dist/assets dist/index.html; then
            echo "[F3-guard] ❌ 纯净版构建泄漏了 F3 代码"
            exit 1
          fi
          echo "[F3-guard] ✓ 纯净版构建未含 F3 标记"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
